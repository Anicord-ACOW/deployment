apiVersion: v1
kind: Namespace
metadata:
  name: anicord-webserver
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
  labels:
    pod-security.kubernetes.io/enforce: baseline

---

apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-namespace"
  namespace: anicord-webserver
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: webserver
  egress:
    - toEndpoints:
        - matchLabels: {} # Allows communication between pods in the same namespace