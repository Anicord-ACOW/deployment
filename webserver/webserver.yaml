apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver
  labels:
    app.kubernetes.io/name: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
        app.kubernetes.io/name: webserver
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: webserver
        image: ghcr.io/anicord-acow/webserver@sha256:25fd4af1851b3eaee932a5afae1081c4dda8f9627183a22407f98b2f81f70c9c
        ports:
        - containerPort: 3000
        env:
        - name: MYSQL
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: MYSQL
        - name: REDIS
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: REDIS
        - name: ORIGIN
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: ORIGIN
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: DISCORD_CLIENT_ID
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: DISCORD_CLIENT_SECRET
        - name: DISCORD_SERVER_ID
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: DISCORD_SERVER_ID
        - name: JWT_PRIVATE_KEY_PATH
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: JWT_PRIVATE_KEY_PATH
        - name: JWT_PUBLIC_KEY_PATH
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: JWT_PUBLIC_KEY_PATH
        - name: COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: COOKIE_SECRET
        volumeMounts:
          - name: keys
            mountPath: /app/keys
            readOnly: true
      volumes:
        - name: keys
          secret:
            secretName: keys

---

apiVersion: v1
kind: Service
metadata:
  name: webserver
  labels:
    app.kubernetes.io/name: webserver
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 13000
  selector:
    app: webserver
