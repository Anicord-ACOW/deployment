apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: webserver
        image: ghcr.io/anicord-acow/webserver@sha256:48650f73c29512b4a0c68ba93dc05d5c9dffbe5cd2bb2bc19593cb7c5cc2d36b
        ports:
        - containerPort: 3000
        env:
        - name: MYSQL
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: MYSQL
        - name: REDIS
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: REDIS
        - name: ORIGIN
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: ORIGIN
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: DISCORD_CLIENT_ID
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: DISCORD_CLIENT_SECRET
        volumeMounts:
          - name: keys
            mountPath: /app/keys
            readOnly: true
      volumes:
        - name: keys
          secret:
            secretName: keys

---

apiVersion: v1
kind: Service
metadata:
  name: webserver
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 13000
  selector:
    app: webserver
