apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: webserver
        image: ghcr.io/anicord-acow/webserver@sha256:1e91c3451035f99681278241dd9ecd4cbc41b31dba0fd2e556fee3cf296851a6
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: "mariadb"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: mariadb-database
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: mariadb-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: mariadb-password
        - name: BETTER_AUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: webserver-secrets
              key: BETTER_AUTH_SECRET
        # Add other environment variables as needed
---
apiVersion: v1
kind: Service
metadata:
  name: webserver
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 13000
  selector:
    app: webserver
